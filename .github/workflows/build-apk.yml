name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter --version
      - run: flutter pub get

      # Patch on_audio_query_android to add required namespace
      # (package is abandoned; this is a well-known workaround)
      - name: Patch on_audio_query namespace
        run: |
          GRADLE_FILE=$(find ~/.pub-cache -path '*on_audio_query_android*/android/build.gradle' | head -n 1)
          echo "Patching: $GRADLE_FILE"
          if ! grep -q 'namespace' "$GRADLE_FILE"; then
            sed -i '/^android {/a\    namespace "com.lucasjosino.on_audio_query"' "$GRADLE_FILE"
          fi
          echo "---- Patched file head ----"
          head -30 "$GRADLE_FILE"

      - run: flutter analyze || true
      - run: flutter build apk --debug
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: melody-flow-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: melody-flow-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
