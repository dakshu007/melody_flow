name: melody_flow
description: A clean, minimal, ad-free offline music player built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ---- Audio Core ----
  just_audio: ^0.9.37          # Rich audio playback engine
  audio_service: ^0.18.15      # Background playback + notification + lock screen + Android Auto
  audio_session: ^0.1.21       # Audio focus / ducking
  just_audio_background: ^0.0.1-beta.13

  # ---- Library / Metadata ----
  on_audio_query: ^2.9.0       # Query device for songs, albums, artists, genres, artwork
  permission_handler: ^11.3.1

  # ---- State Management ----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---- Local Storage ----
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # ---- UI / UX ----
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+4  # Dynamic color from album art
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  marquee: ^2.2.3
  animations: ^2.0.11
  smooth_page_indicator: ^1.1.0
  flutter_slidable: ^3.1.0
  dynamic_color: ^1.7.0        # Material You support (Android 12+)

  # ---- Lyrics ----
  flutter_lyric: ^2.0.4+6


  # ---- In-App Purchase (to unlock Oto+ style premium tiers if needed) ----
  # Main app is a paid app on Play Store ($1), so IAP is optional for tips/upgrades later.
  in_app_purchase: ^3.2.0

  # ---- Utils ----
  path: ^1.9.0
  collection: ^1.18.0
  rxdart: ^0.27.7
  uuid: ^4.4.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icons/app_icon_fg.png"

flutter_native_splash:
  color: "#0A0A0A"
  image: assets/icons/splash.png
  android_12:
    image: assets/icons/splash.png
    color: "#0A0A0A"

