plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

android {
    namespace "com.melodyflow.app"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = '17' }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.melodyflow.app"
        minSdk 23           // Android 6 — gives full just_audio + audio_service support
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    
    signingConfigs {
        // To sign for Play Store:
        // 1. keytool -genkey -v -keystore ~/melody-upload.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload
        // 2. Create android/key.properties with:
        //      storeFile=/full/path/to/melody-upload.jks
        //      storePassword=YOUR_PASSWORD
        //      keyPassword=YOUR_PASSWORD
        //      keyAlias=upload
        // 3. Uncomment this block:
        // release {
        //     def keystoreProperties = new Properties()
        //     def keystorePropertiesFile = rootProject.file('key.properties')
        //     if (keystorePropertiesFile.exists()) {
        //         keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
        //     }
        //     keyAlias keystoreProperties['keyAlias']
        //     keyPassword keystoreProperties['keyPassword']
        //     storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
        //     storePassword keystoreProperties['storePassword']
        // }
    }

    buildTypes {
        release {
            // Replace with your upload keystore before publishing.
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter { source '../..' }

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.google.android.play:core:1.10.3'
    implementation 'com.google.android.play:core-ktx:1.8.1'
}
